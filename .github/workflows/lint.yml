name: lint

on:
  push:
    branches: ["**"]
    paths: ["**.py", "pyproject.toml", "requirements*.txt", "uv.lock", ".python-version", ".node-version", ".npmrc", "package.json", "pnpm-lock.yaml", ".github/workflows/lint.yml"]
  pull_request:
    branches: ["**"]
    paths: ["**.py", "pyproject.toml", "requirements*.txt", "uv.lock", ".python-version", ".node-version", ".npmrc", "package.json", "pnpm-lock.yaml", ".github/workflows/lint.yml"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile --trust-lockfile

      - name: Install Python dependencies
        run: pnpm install:py

      - name: Ruff lint
        run: pnpm lint:py

      - name: Pyright type check
        run: pnpm typecheck

      - name: Pytest
        run: pnpm test
