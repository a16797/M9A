name: lint

on:
  push:
    branches: ["**"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "uv.lock"
      - ".python-version"
      - ".node-version"
      - ".npmrc"
      - "deps/tools/**/*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tools/validate-schema.mjs"
      - "tools/sync-schema.mjs"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "uv.lock"
      - ".python-version"
      - ".node-version"
      - ".npmrc"
      - "deps/tools/**/*.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tools/validate-schema.mjs"
      - "tools/sync-schema.mjs"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile --trust-lockfile

      - name: Install Python dependencies
        run: pnpm install:py

      - name: Schema shape check
        run: pnpm check:schema

      - name: Python checks
        run: pnpm check:py
