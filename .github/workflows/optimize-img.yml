name: PNG Image Optimization

on:
  push:
    branches:
      - "main"
    paths:
      - "**/*.png"
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit Message"
        type: string
        required: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  optimize-png:
    name: Optimize PNG Images
    # Only run on main repo, skip bot commits to prevent infinite loops
    if: >-
      ${{ github.repository_owner == 'MAA1999' &&
          github.actor != 'github-actions[bot]' &&
          github.triggering_actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          show-progress: false
          fetch-depth: 0

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: |
          pip install -r tools/optimize_templates/requirements.txt

      - name: Setup oxipng
        uses: baptiste0928/cargo-install@v3
        with:
          crate: oxipng

      - name: Optimize png images
        run: |
          python3 tools/optimize_templates/optimize_templates.py

      - name: Commit changes
        id: commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            commit_msg="${{ github.event.inputs.commit_message }}"
            if [ -z "$commit_msg" ]; then
              commit_msg="chore: Auto Templates Optimization"
            fi
            git commit -m "$commit_msg" -m "Triggered by ${{github.sha}}" -m "[skip changelog]"
            git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
            echo "have_commits=True" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit_changes.outputs.have_commits == 'True' && github.repository_owner == 'MAA1999'
        run: git push origin "HEAD:${GITHUB_REF_NAME}"
