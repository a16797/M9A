name: check

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - ".node-version"
      - ".npmrc"
      - "deps/tools/**/*.json"
      - "interface.json"
      - "resource/**"
      - "data/**"
      - "tasks/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "requirements*.txt"
      - "tools/validate-schema.mjs"
      - "tools/sync-schema.mjs"
      - "**.py"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/check.yml"
      - ".node-version"
      - ".npmrc"
      - "deps/tools/**/*.json"
      - "interface.json"
      - "resource/**"
      - "data/**"
      - "tasks/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "pyproject.toml"
      - "requirements*.txt"
      - "tools/validate-schema.mjs"
      - "tools/sync-schema.mjs"
      - "**.py"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  resource:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Use Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Run schema and maa checks
        run: |
          pnpm install --frozen-lockfile --trust-lockfile
          pnpm check:schema
          pnpm check:maa
